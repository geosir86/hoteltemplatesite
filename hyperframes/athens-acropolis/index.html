<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Athens Acropolis - Cinematic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,wght@0,400;0,700;1,400&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-ink: #14110E;
            --brand-stone: #F7F3EA;
            --brand-bronze: #B8894A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--brand-ink); 
            width: 1920px; 
            height: 1080px; 
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--brand-stone);
        }

        #root {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .clip {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            filter: brightness(0.9) contrast(1.05);
        }

        /* Overlays */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.3) 100%);
            z-index: 100;
            pointer-events: none;
        }

        .grain {
            position: absolute;
            inset: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_filmgrain.png');
            opacity: 0.02;
            z-index: 101;
            pointer-events: none;
        }

        /* Framing */
        .frame-line {
            position: absolute;
            background: rgba(247, 243, 234, 0.1);
            z-index: 110;
        }
        .frame-h { width: 100%; height: 1px; left: 0; }
        .frame-v { height: 100%; width: 1px; top: 0; }

        /* Transitions */
        .transition-curtain {
            position: absolute;
            inset: 0;
            background: var(--brand-ink);
            z-index: 200;
            transform: scaleY(0);
            transform-origin: bottom;
        }
    </style>
</head>
<body>
    <div id="root" data-composition-id="athens-cinematic" data-start="0" data-duration="16" data-width="1920" data-height="1080"><img id="athens_acropolis_master_bedroom" class="clip" src="assets/athens_acropolis_master_bedroom.png" data-start="1.81" data-duration="3" data-track-index="2" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 9" />
        <div class="vignette"></div>
        <div class="grain"></div>

        <!-- Framing Lines -->
        <div class="frame-line frame-h" style="top: 120px;"></div>
        <div class="frame-line frame-h" style="bottom: 120px;"></div>
        <div class="frame-line frame-v" style="left: 120px;"></div>
        <div class="frame-line frame-v" style="right: 120px;"></div>

        <!-- UI Elements REMOVED for dynamic React overlays -->


        <!-- Scene 1: The Hero View -->
        <div id="s1" class="clip" data-start="0" data-duration="4" style="z-index: 9">
            <img class="bg-img" src="assets/greek_luxury_terrace_sunset_view_1776942676038.png">
        </div>

        <!-- Scene 2: Living Sanctuary -->
        <div id="s2" class="clip" data-start="4" data-duration="4" style="z-index: 7">
            <img class="bg-img" src="assets/greek_luxury_living_room_dining_1776942426126.png">
        </div>

        <!-- Scene 3: Master Suite -->
        <div id="s3" class="clip" data-start="8" data-duration="4" style="z-index: 5">
            <img class="bg-img" src="assets/athens_acropolis_master_bedroom.png">
        </div>

        <!-- Scene 4: Marble Luxury -->
        <div id="s4" class="clip" data-start="12" data-duration="4" style="z-index: 8">
            <img class="bg-img" src="assets/greek_luxury_marble_bathroom_1776942694181.png">
        </div>


        <div id="curtain" class="transition-curtain" style="z-index: 1"></div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Scene 1: Start
        tl.fromTo("#s1 .bg-img", { scale: 1.1 }, { scale: 1, duration: 4, ease: "sine.inOut" }, 0);

        // Transition 1 -> 2
        tl.to("#curtain", { scaleY: 1, duration: 0.6, ease: "power4.inOut" }, 3.4)
          .to("#curtain", { scaleY: 0, transformOrigin: "top", duration: 0.6, ease: "power4.inOut" }, 4);

        // Scene 2: Living
        tl.fromTo("#s2 .bg-img", { scale: 1.2, x: 100 }, { scale: 1.05, x: 0, duration: 4, ease: "power1.out" }, 4);

        // Transition 2 -> 3
        tl.to("#curtain", { scaleY: 1, transformOrigin: "bottom", duration: 0.6, ease: "power4.inOut" }, 7.4)
          .to("#curtain", { scaleY: 0, transformOrigin: "top", duration: 0.6, ease: "power4.inOut" }, 8);

        // Scene 3: Bedroom
        tl.fromTo("#s3 .bg-img", { scale: 1, y: -50 }, { scale: 1.15, y: 50, duration: 4, ease: "none" }, 8);

        // Transition 3 -> 4
        tl.to("#curtain", { scaleY: 1, transformOrigin: "bottom", duration: 0.6, ease: "power4.inOut" }, 11.4)
          .to("#curtain", { scaleY: 0, transformOrigin: "top", duration: 0.6, ease: "power4.inOut" }, 12);


        // Scene 4: Kitchen
        tl.fromTo("#s4 .bg-img", { scale: 1.3, rotation: -2 }, { scale: 1, rotation: 0, duration: 4, ease: "power2.out" }, 12);

        // Loop Out
        tl.to("#root", { autoAlpha: 0, duration: 0.5 }, 15.5);

        window.__timelines["athens-cinematic"] = tl;
    </script>

</body>
</html>
