<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1A0F08;
        font-family: 'DM Sans', sans-serif;
        color: #F2E8D9;
      }
      #root { width: 100%; height: 100%; position: relative; }
      
      .clip { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
      
      .bg-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.6);
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(26,15,8,0.2) 0%, rgba(26,15,8,0.8) 100%);
      }

      .content-wrapper {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 100px;
      }

      h1 {
        font-family: 'Libre Baskerville', serif;
        font-size: 120px;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
        text-transform: uppercase;
        opacity: 0;
      }

      .subtitle {
        font-size: 32px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #D4892A;
        font-weight: 500;
        margin-bottom: 40px;
        opacity: 0;
      }

      .location {
        font-size: 24px;
        opacity: 0.8;
        letter-spacing: 0.1em;
        opacity: 0;
      }

      .amenities-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        margin-top: 60px;
        width: 100%;
        max-width: 1200px;
        opacity: 0;
      }

      .amenity-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .amenity-label {
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .price-tag {
        position: absolute;
        bottom: 80px;
        right: 80px;
        background: rgba(212, 137, 42, 0.9);
        color: #1A0F08;
        padding: 20px 40px;
        border-radius: 4px;
        font-weight: 700;
        font-size: 36px;
        opacity: 0;
      }

      .logo {
        position: absolute;
        top: 60px;
        left: 60px;
        font-family: 'Libre Baskerville', serif;
        font-size: 24px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="24" data-width="1920" data-height="1080">
      
      <!-- Scene 1: Hero Exterior -->
      <div id="scene1" class="clip" data-start="0" data-duration="4">
        <img src="assets/crete_hero.png" class="bg-image">
        <div class="overlay"></div>
      </div>

      <!-- Scene 2: Living Area -->
      <div id="scene2" class="clip" data-start="4" data-duration="4" style="opacity: 0">
        <img src="assets/crete_living.png" class="bg-image">
        <div class="overlay"></div>
      </div>

      <!-- Scene 3: Master Bed -->
      <div id="scene3" class="clip" data-start="8" data-duration="4" style="opacity: 0">
        <img src="assets/crete_bed.png" class="bg-image">
        <div class="overlay"></div>
      </div>

      <!-- Scene 4: Terrace Sunset -->
      <div id="scene4" class="clip" data-start="12" data-duration="4" style="opacity: 0">
        <img src="assets/greek_luxury_terrace_sunset_view_1776942676038.png" class="bg-image">
        <div class="overlay"></div>
      </div>

      <!-- Scene 5: Marble Bathroom -->
      <div id="scene5" class="clip" data-start="16" data-duration="4" style="opacity: 0">
        <img src="assets/greek_luxury_marble_bathroom_1776942694181.png" class="bg-image">
        <div class="overlay"></div>
      </div>

      <!-- Scene 6: Kitchen Detail -->
      <div id="scene6" class="clip" data-start="20" data-duration="4" style="opacity: 0">
        <img src="assets/greek_luxury_kitchen_detail_1776942713984.png" class="bg-image">
        <div class="overlay"></div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Scene transitions
      const scenes = ["#scene1", "#scene2", "#scene3", "#scene4", "#scene5", "#scene6"];
      
      scenes.forEach((scene, index) => {
        const start = index * 4;
        
        // Ken Burns effect for each scene
        tl.fromTo(`${scene} .bg-image`, 
          { scale: 1.1, x: -20 }, 
          { scale: 1, x: 0, duration: 4, ease: "none" }, 
          start
        );

        // Fade transitions
        if (index > 0) {
          tl.to(scene, { opacity: 1, duration: 1, ease: "power1.inOut" }, start);
        }
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
